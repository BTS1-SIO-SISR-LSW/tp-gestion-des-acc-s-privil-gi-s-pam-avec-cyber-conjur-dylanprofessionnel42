services:
  openssl:
    image: cyberark/conjur:1.20.0
    container_name: conjur_openssl
    entrypoint:
      - openssl
      - req
      - -newkey
      - rsa:2048
      - -days
      - "365"
      - -nodes
      - -x509
      - -config
      - /tmp/conf/tls.conf
      - -extensions
      - v3_ca
      - -keyout
      - /tmp/conf/nginx.key
      - -out
      - /tmp/conf/nginx.crt
    volumes:
      - ./conf/tls:/tmp/conf

  database:
    image: postgres:15
    container_name: postgres_database
    environment:
      POSTGRES_HOST_AUTH_METHOD: password
      POSTGRES_PASSWORD: SuperSecretPg
    restart: unless-stopped

  conjur:
    image: cyberark/conjur:1.20.0
    container_name: conjur_server
    command: server
    environment:
      DATABASE_URL: postgres://postgres:SuperSecretPg@database/postgres
      CONJUR_DATA_KEY: ${CONJUR_DATA_KEY}
      CONJUR_AUTHENTICATORS:
      CONJUR_TELEMETRY_ENABLED: "false"
      CONJUR_API_RESOURCE_LIST_LIMIT_MAX: "5000"
    depends_on:
      - database
    restart: unless-stopped
    ports:
      - "8080:80"

  proxy:
    image: nginx:latest
    container_name: nginx_proxy
    depends_on:
      - conjur
      - openssl
    volumes:
      - ./conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./conf/tls:/etc/nginx/tls:ro
    restart: unless-stopped

  client:
    image: cyberark/conjur-cli:9
    container_name: conjur_client
    depends_on:
      - proxy
    entrypoint: sleep
    command: infinity
    volumes:
      - ./policies:/policy
      - ./:/workspace
    restart: unless-stopped
